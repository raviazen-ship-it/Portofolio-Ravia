<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Portfolio - Contact</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/flowbite@2.5.1/dist/flowbite.min.js"></script>
    <script type="text/javascript" src="https://cdn.jsdelivr.net/npm/@emailjs/browser@4/dist/email.min.js"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
maroon: { 400: '#A52A2A', 500: '#800000', 600: '#660000' },
                        gold: { 400: '#DAA520', 500: '#B8860B' },
                        burgundy: { 500: '#8B0000', 600: '#4A0000' }

                    }
                }
            }
        }
    </script>
</head>
<body class="bg-gradient-to-br from-slate-900 via-navy-900 to-black text-white dark">
    <div id="loader" class="fixed inset-0 bg-gradient-to-br from-neonblue-600 via-purple-600 to-blue-900 flex items-center justify-center z-50">
        <div class="animate-spin rounded-full h-20 w-20 border-4 border-white/30 border-t-white"></div>
    </div>
    <nav>
        <div class="max-w-screen-xl mx-auto px-4 py-4 flex items-center justify-between">
            <div class="text-xl md:text-2xl font-black bg-gradient-to-r from-cyan-300 to-cyan-400 bg-clip-text text-transparent drop-shadow-lg">PORTFOLIO WEBSITE</div>
            
            <!-- Desktop Navigation Links -->
            <ul class="hidden md:flex space-x-4 lg:space-x-8">
                <li><a href="index.html" class="text-white hover:text-neonblue-400 bg-gray-800/50 hover:bg-neonblue-500/20 font-medium rounded-xl text-sm lg:text-base px-4 lg:px-6 py-3 transition-all duration-300">Home</a></li>
                <li><a href="about.html" class="text-white hover:text-neonblue-400 bg-gray-800/50 hover:bg-neonblue-500/20 font-medium rounded-xl text-sm lg:text-base px-4 lg:px-6 py-3 transition-all duration-300">About</a></li>
                <li><a href="projects.html" class="text-white hover:text-neonblue-400 bg-gray-800/50 hover:bg-neonblue-500/20 font-medium rounded-xl text-sm lg:text-base px-4 lg:px-6 py-3 transition-all duration-300">Projects</a></li>
                <li><a href="contact.html" class="active-nav text-neonblue-400 bg-neonblue-500/30 font-medium rounded-xl text-sm lg:text-base px-4 lg:px-6 py-3 transition-all duration-300 border-2 border-neonblue-400/50">Contact</a></li>
            </ul>
            
            <!-- Burger Menu Button (Mobile Only) -->
            <button id="menu-toggle" class="flex md:hidden items-center justify-center w-10 h-10 text-white hover:text-neonblue-400 transition-colors">
                <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
                    <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M4 6h16M4 12h16M4 18h16"></path>
                </svg>
            </button>
        </div>
        
        <!-- Mobile Menu -->
        <div id="mobile-menu" class="hidden md:hidden bg-gray-800/95 backdrop-blur-md">
            <ul class="flex flex-col space-y-2 px-4 py-4">
                <li><a href="index.html" class="block text-white hover:text-neonblue-400 bg-gray-700/50 hover:bg-neonblue-500/20 font-medium rounded-xl px-4 py-3 transition-all duration-300">Home</a></li>
                <li><a href="about.html" class="block text-white hover:text-neonblue-400 bg-gray-700/50 hover:bg-neonblue-500/20 font-medium rounded-xl px-4 py-3 transition-all duration-300">About</a></li>
                <li><a href="projects.html" class="block text-white hover:text-neonblue-400 bg-gray-700/50 hover:bg-neonblue-500/20 font-medium rounded-xl px-4 py-3 transition-all duration-300">Projects</a></li>
                <li><a href="contact.html" class="active-nav block text-neonblue-400 bg-neonblue-500/30 font-medium rounded-xl px-4 py-3 transition-all duration-300 border-l-2 border-neonblue-400">Contact</a></li>
            </ul>
        </div>
    </nav>

    <main class="min-h-screen">
        <section class="py-24 px-6">
            <div class="max-w-2xl mx-auto text-center">
                <h1 class="text-5xl lg:text-6xl font-black bg-gradient-to-r from-white via-neonblue-400 to-purple-400 bg-clip-text text-transparent mb-8 drop-shadow-2xl">Let's Connect</h1>
                <p class="text-2xl text-gray-400 mb-20 leading-relaxed max-w-2xl mx-auto bg-gray-800/30 backdrop-blur-md px-12 py-8 rounded-3xl border border-white/10">Ready for your next neon-powered project?</p>
                <form id="contact-form" class="space-y-8 max-w-2xl mx-auto">
                    <div class="relative pt-6">
                        <input type="text" id="user_name" placeholder="Your Name" required class="w-full p-6 bg-gray-800/70 backdrop-blur-md border border-gray-600/50 rounded-3xl text-xl placeholder-gray-500 focus:ring-4 focus:ring-neonblue-500/50 focus:border-neonblue-400/50 transition-all duration-300 text-white peer">
                    </div>
                    <div class="relative">
                        <input type="email" id="user_email" placeholder="Your Email" required class="w-full p-6 bg-gray-800/70 backdrop-blur-md border border-gray-600/50 rounded-3xl text-xl placeholder-gray-500 focus:ring-4 focus:ring-neonblue-500/50 focus:border-neonblue-400/50 transition-all duration-300 text-white peer">
                    </div>
                    <div class="relative">
                        <textarea id="message" placeholder="Tell me about your vision..." rows="8" required class="w-full p-6 bg-gray-800/70 backdrop-blur-md border border-gray-600/50 rounded-3xl text-xl placeholder-gray-500 focus:ring-4 focus:ring-neonblue-500/50 focus:border-neonblue-400/50 transition-all duration-300 resize-vertical text-white peer"></textarea>
                    </div>
                    <button type="submit" class="w-full bg-gradient-to-r from-neonblue-500 to-purple-600 hover:from-neonblue-600 hover:to-purple-700 text-white font-black py-8 px-12 rounded-3xl text-2xl transition-all duration-500 transform hover:scale-105 hover:shadow-2xl hover:shadow-neonblue-500/50 shadow-lg border-2 border-white/20 focus:ring-4 focus:ring-neonblue-400/50">Launch Project</button>
                </form>
                <div class="mt-24 p-10 bg-gray-800/50 backdrop-blur-md rounded-3xl border border-gray-700/50 shadow-2xl">
                    <h3 class="text-3xl font-bold text-white mb-6 text-center">Direct Contact</h3>
                    <div class="grid md:grid-cols-2 gap-8 text-center">
                        <div>
                            <p class="text-2xl font-mono text-neonblue-400 mb-2">raviazen@gmail.com</p>
                            <p class="text-lg text-gray-400">Primary</p>
                        </div>
                        <div>
                            <p class="text-xl font-semibold hover:text-neonblue-400 transition-colors">LinkedIn / GitHub</p>
                            <p class="text-lg text-gray-400">Connect & collaborate</p>
                        </div>
                    </div>
                </div>
            </div>
        </section>
    </main>

    <script src="script.js"></script>
</body>
</html>
